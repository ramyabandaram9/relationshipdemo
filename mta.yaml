_schema-version: 3.3.0
ID: relationshipdemo
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: relationshipdemo-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: relationshipdemo-auth  # <-- added XSUAA binding here

  - name: relationshipdemo-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: srv-api
      - name: relationshipdemo-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: relationshipdemosalesorderdata
          artifacts:
            - salesorderdata.zip
          target-path: app/

  - name: relationshipdemosalesorderdata
    type: html5
    path: app/salesorderdata
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

resources:
  - name: relationshipdemo-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: relationshipdemo-auth     # <-- added XSUAA resource
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json  # Make sure this file exists in your root