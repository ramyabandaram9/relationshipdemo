_schema-version: 3.3.0
ID: relationshipdemo
description: A simple CAP project.
version: 1.0.0

modules:

  - name: relationshipdemo-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: relationshipdemo-auth
      - name: relationshipdemo-db
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci

  - name: relationshipdemo-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: srv-api
      - name: relationshipdemo-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - artifacts:
            - salesorderdata.zip
          name: relationshipdemosalesorderdata
          target-path: app/

  - name: relationshipdemosalesorderdata
    type: html5
    path: app/salesorderdata
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: relationshipdemo-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: relationshipdemo-db
    parameters:
      buildpack: nodejs_buildpack

  - name: relationshipdemo-destination-content
    type: com.sap.application.content
    requires:
      - name: relationshipdemo-destination-service
        parameters:
          content-target: true
      - name: relationshipdemo-srv
      - name: relationshipdemo-html5-repo-host
        parameters:
          service-key:
            name: relationshipdemo-html5-repo-host-key
      - name: relationshipdemo-auth
        parameters:
          service-key:
            name: relationshipdemo-auth-key
    parameters:
      content:
        instance:
          destinations:

            # CAP service destination
            - Name: srv-api
              ServiceInstanceName: relationshipdemo-srv
              ProxyType: Internet
              Authentication: NoAuthentication
              HTML5.ForwardAuthToken: true

            # HTML5 repo host destination
            - Name: relationshipapprouter_relationshipdemo_html5_repo_host
              ServiceInstanceName: relationshipdemo-html5-repo-host
              ServiceKeyName: relationshipdemo-html5-repo-host-key
              sap.cloud.service: relationshipapprouter

            # Auth destination
            - Name: relationshipapprouter_relationshipdemo_auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: relationshipdemo-auth
              ServiceKeyName: relationshipdemo-auth-key
              sap.cloud.service: relationshipapprouter

          existing_destinations_policy: ignore
    build-parameters:
      no-source: true

resources:

  - name: relationshipdemo-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: relationshipdemo-auth
    type: org.cloudfoundry.managed-service
    parameters:
      path: ./xs-security.json
      service: xsuaa
      service-plan: application

  - name: relationshipdemo-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: relationshipdemo-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      service-name: relationshipdemo-destination-service
      config:
        HTML5Runtime_enabled: true
        version: 1.0.0

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production